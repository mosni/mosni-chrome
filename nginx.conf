# ui.mosni.dev — mosnicat docs/examples site + raw drop-in assets, served from the built dist/
# (static-build kind — see infrastructure/docs/static-build-pattern.md). certbot adds the 443 block
# on first deploy (bootstrap dance, same as every new app); once issued, commit the full 443 block
# here so `git reset --hard` on redeploy can never drop it (see migration-decisions.md, "vhost TLS
# committed, not certbot-injected").
server {
    server_name ui.mosni.dev;
    root /srv/stack/apps/mosni-chrome/dist;
    index index.html;
    # dist/ only ever contains build output, but keep the house defense-in-depth rule anyway.
    location ~ /\. { return 404; }
    location / { try_files $uri $uri/ =404; }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/ui.mosni.dev/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/ui.mosni.dev/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}

server {
    if ($host = ui.mosni.dev) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    server_name ui.mosni.dev;
    listen 80;
    return 404; # managed by Certbot


}